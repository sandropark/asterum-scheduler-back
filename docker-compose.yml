services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: asterum
      POSTGRES_USER: asterum
      POSTGRES_PASSWORD: asterum
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data:
