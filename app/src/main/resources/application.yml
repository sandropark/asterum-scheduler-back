spring:
  application:
    name: asterum_scheduler
  datasource:
    url: jdbc:postgresql://localhost:15432/asterum
    username: asterum
    password: asterum
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
